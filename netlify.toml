[build]
  command = "npm run build"
  publish = "dist"

# Client-side routing (react-router-dom, BrowserRouter) — without this,
# refreshing or deep-linking to e.g. /admin/dashboard returns a 404 from
# Netlify's static file server instead of falling through to index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
